'use client';

import * as React from 'react';
import { MessageCircle, X, Send, Bot } from 'lucide-react';
import { useLanguage } from '@/lib/store';
import { cn } from '@/lib/utils';

type Msg = { id: number; text: string; from: 'bot' | 'user' };

export function LiveChat() {
  const { t } = useLanguage();
  const [open, setOpen] = React.useState(false);
  const [input, setInput] = React.useState('');
  const [msgs, setMsgs] = React.useState<Msg[]>([
    { id: 1, text: t('chatWelcome'), from: 'bot' },
  ]);

  const send = (e: React.FormEvent) => {
    e.preventDefault();
    if (!input.trim()) return;
    const userMsg: Msg = { id: Date.now(), text: input, from: 'user' };
    setMsgs((p) => [...p, userMsg]);
    setInput('');
    setTimeout(() => {
      const replies = [
        'Thanks for reaching out! Our team will get back to you shortly.',
        'I can help you with order tracking, returns, and product questions.',
        'Is there anything else I can assist you with today?',
      ];
      setMsgs((p) => [...p, { id: Date.now() + 1, text: replies[Math.floor(Math.random() * replies.length)], from: 'bot' }]);
    }, 800);
  };

  return (
    <>
      {/* Toggle button */}
      <button
        onClick={() => setOpen(!open)}
        className="fixed bottom-5 end-5 z-[80] flex h-14 w-14 items-center justify-center rounded-full gradient-primary text-white shadow-glow transition-transform hover:scale-110 animate-pulse-ring"
        aria-label="live chat"
      >
        {open ? <X className="h-6 w-6" /> : <MessageCircle className="h-6 w-6" />}
      </button>

      {/* Chat panel */}
      <div
        className={cn(
          'fixed bottom-24 end-5 z-[79] flex h-96 w-80 max-w-[calc(100vw-2.5rem)] flex-col overflow-hidden rounded-2xl border border-border bg-card shadow-2xl transition-all',
          open ? 'scale-100 opacity-100' : 'pointer-events-none scale-90 opacity-0'
        )}
      >
        <div className="flex h-14 items-center gap-2 border-b bg-primary px-4 text-primary-foreground">
          <div className="flex h-8 w-8 items-center justify-center rounded-full bg-white/20">
            <Bot className="h-5 w-5" />
          </div>
          <div>
            <p className="text-sm font-bold">{t('chatBotName')}</p>
            <p className="flex items-center gap-1 text-[10px]">
              <span className="h-1.5 w-1.5 rounded-full bg-green-400" /> {t('online')}
            </p>
          </div>
        </div>

        <div className="flex-1 space-y-3 overflow-y-auto p-3 scrollbar-thin">
          {msgs.map((m) => (
            <div key={m.id} className={cn('flex', m.from === 'user' ? 'justify-end' : 'justify-start')}>
              <div
                className={cn(
                  'max-w-[80%] rounded-2xl px-3 py-2 text-sm',
                  m.from === 'user' ? 'rounded-ee-sm bg-primary text-primary-foreground' : 'rounded-es-sm bg-secondary'
                )}
              >
                {m.text}
              </div>
            </div>
          ))}
        </div>

        <form onSubmit={send} className="flex gap-2 border-t p-3">
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            placeholder={t('typeMessage')}
            className="flex-1 rounded-full border border-border bg-background px-3 py-2 text-sm outline-none focus:border-primary"
          />
          <button type="submit" className="flex h-9 w-9 items-center justify-center rounded-full gradient-primary text-white">
            <Send className="h-4 w-4" />
          </button>
        </form>
      </div>
    </>
  );
}
